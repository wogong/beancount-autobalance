beancount_output: ./beancount_output.beancount
default_currency: usd
healthcheck_url: "https://hc-ping.com/<your-uuid>/beancount"

# RPC endpoints, exported to <NAME>_ENDPOINT env vars before fetchers run.
# Keyless public nodes work out of the box; Infura-style URLs need an api_key.
bsc_endpoint: "https://bsc-rpc.publicnode.com"
eth_endpoint: "https://ethereum-rpc.publicnode.com"
polygon_endpoint: "https://polygon-bor-rpc.publicnode.com"
base_endpoint: "https://base-rpc.publicnode.com"

entries:
  # 1) Plain account: an assertion is appended on the matching day(s). With no
  #    api_function the static `balance` is used; accounts default to
  #    default_currency, so only non-default ones need `currency`.
  - dates: [1, 15]
    description: Twice-monthly credit cards (bill days 1 and 15)
    accounts:
      - account: Liabilities:CreditCard:Example
        balance: "-0.00"
      - account: Liabilities:CreditCard:USDExample
        currency: USD

  # 2) Crypto shorthand: expands into one account per (wallet, chain, token),
  #    each fetched live from the chain. Account names become
  #    <prefix>:<LABEL>:<CHAIN-SEGMENT>:<TOKEN>. Add a holding by adding one word.
  - dates: [7, 14, 21, 28]
    description: Weekly crypto balances
    crypto:
      # prefix: Assets:Investments:Crypto:Wallet   # optional; this is the default
      # chain key -> account-name segment (defaults to UPPERCASE, e.g. bsc -> BSC)
      chains:
        eth: Ethereum
        base: Base
        polygon: Polygon
      wallets:
        MAIN:
          address: "0xYourWalletAddress"
          holdings:
            bsc: [BNB, USDT, USDC]
            eth: [ETH, USDT, USDC]
            polygon: [POL, USDC]
            # base: [ETH, USDC]
